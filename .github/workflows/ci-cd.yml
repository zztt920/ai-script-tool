name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m unittest tests.test_novel_to_script -v
    
    - name: Lint code
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t ai-script-tool:${{ github.sha }} .
    
    - name: Test Docker container
      run: |
        docker run -d -p 8000:8000 --name script-tool ai-script-tool:${{ github.sha }}
        sleep 5
        curl -s http://localhost:8000/health | grep -q '"status":"ok"'
        docker stop script-tool
        docker rm script-tool

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        echo "Deployment step would go here"
        echo "This could include:"
        echo "1. Pushing Docker image to registry"
        echo "2. Deploying to Kubernetes / Docker Swarm"
        echo "3. Running database migrations"
        echo "4. Health checks"

  publish-docs:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Generate OpenAPI spec
      run: |
        python -c "
from api.main import app
import json
openapi_spec = app.openapi()
with open('openapi.json', 'w', encoding='utf-8') as f:
    json.dump(openapi_spec, f, ensure_ascii=False, indent=2)
"
    
    - name: Upload OpenAPI spec
      uses: actions/upload-artifact@v4
      with:
        name: openapi-spec
        path: openapi.json