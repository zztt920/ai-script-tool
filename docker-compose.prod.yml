version: "3.9"

# ── AI 剧本创作工具 — 生产级部署 ──────────────────────
# 用法:
#   1. cp .env.example .env  &&  编辑 .env 填入 API Key
#   2. (首次) bash nginx/ssl/generate.sh  生成自签名证书
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. 访问 https://localhost/docs

services:
  # ── Nginx 反向代理（SSL 终止 + 限流）───────────
  nginx:
    image: nginx:1.25-alpine
    container_name: script-tool-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app_net

  # ── FastAPI 应用 ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: script-tool-api:latest
    container_name: script-tool-api
    expose:
      - "8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - SCRIPT_DB_PATH=/app/data/script_tool.db
    volumes:
      - script_output:/app/output
      - script_data:/app/data
      - script_checkpoints:/app/checkpoints
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app_net

volumes:
  script_output:
    name: script-tool-output
  script_data:
    name: script-tool-data
  script_checkpoints:
    name: script-tool-checkpoints

networks:
  app_net:
    name: script-tool-net
    driver: bridge
